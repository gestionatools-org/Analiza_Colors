name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
      - 'codex/**'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Eliminar metadatos Git antes del deploy
        run: rm -rf .git

      - name: Desplegar en producción
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  deploy-preview:
    if: >
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/claude/') ||
      startsWith(github.ref, 'refs/heads/codex/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Eliminar metadatos Git antes del deploy
        run: rm -rf .git

      - name: Desplegar preview
        run: npx vercel@latest deploy --yes --token=${{ secrets.VERCEL_TOKEN }}